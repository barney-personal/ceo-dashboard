databases:
  - name: ceo-dashboard-db
    plan: pro-4gb
    databaseName: ceo_dashboard
    user: ceo_dashboard

# ---------------------------------------------------------------------------
# Environment variable management
# ---------------------------------------------------------------------------
# All secrets and configurable values live in Doppler (`ceo-dashboard/prd`).
# To push Doppler → Render run:
#     RENDER_API_KEY=rnd_... make sync-render-env
# (or `doppler run -- make sync-render-env` if RENDER_API_KEY is in Doppler).
#
# Only Render-managed values stay declared here:
#   - DATABASE_URL  → `fromDatabase` ref (auto-resolved)
#   - CRON_SECRET   → `generateValue: true` (Render auto-generates)
#   - NODE_ENV      → static "production"
# Everything else (Mode, Slack, Clerk, Sentry, Anthropic, Google, GitHub,
# Granola, etc.) is pushed from Doppler by the sync script and not
# duplicated in this file.
# ---------------------------------------------------------------------------

services:
  - type: web
    name: ceo-dashboard
    runtime: node
    plan: pro
    buildCommand: NODE_ENV=development npm ci && npm run build
    preDeployCommand: npx drizzle-kit migrate
    startCommand: npm start
    healthCheckPath: /
    maxShutdownDelaySeconds: 300
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ceo-dashboard-db
          property: connectionString
      - key: CRON_SECRET
        generateValue: true

  - type: worker
    name: ceo-dashboard-sync-worker
    runtime: node
    plan: pro
    buildCommand: NODE_ENV=development npm ci && npm run build
    startCommand: npm run sync-worker
    maxShutdownDelaySeconds: 300
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ceo-dashboard-db
          property: connectionString

  - type: cron
    name: ceo-dashboard-cron
    runtime: node
    schedule: "0 */2 * * *"
    buildCommand: npm ci
    startCommand: 'curl -s -H "Authorization: Bearer $CRON_SECRET" ${RENDER_EXTERNAL_URL}/api/cron'
    envVars:
      - key: CRON_SECRET
        fromService:
          name: ceo-dashboard
          type: web
          envVarKey: CRON_SECRET
      - key: RENDER_EXTERNAL_URL
        fromService:
          name: ceo-dashboard
          type: web
          envVarKey: RENDER_EXTERNAL_URL
