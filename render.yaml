databases:
  - name: ceo-dashboard-db
    plan: pro-4gb
    databaseName: ceo_dashboard
    user: ceo_dashboard

services:
  - type: web
    name: ceo-dashboard
    runtime: node
    plan: pro
    buildCommand: NODE_ENV=development npm ci && npm run build
    preDeployCommand: npx drizzle-kit migrate
    startCommand: npm start
    healthCheckPath: /
    maxShutdownDelaySeconds: 300
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ceo-dashboard-db
          property: connectionString
      - key: NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY
        sync: false
      - key: CLERK_SECRET_KEY
        sync: false
      - key: NEXT_PUBLIC_CLERK_SIGN_IN_URL
        value: /sign-in
      - key: NEXT_PUBLIC_CLERK_SIGN_UP_URL
        value: /sign-up
      - key: MODE_API_TOKEN
        sync: false
      - key: MODE_API_SECRET
        sync: false
      - key: MODE_WORKSPACE
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_OKR_CHANNEL_IDS
        value: "C05LACCBKPU,C09E6L6336G,C09E30B8PD0,C09DMP0UBGX,C09EG0TTJQ1"
      - key: HIBOB_API_TOKEN
        sync: false
      - key: HIBOB_SERVICE_USER_ID
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SENTRY_DSN
        value: "https://b20d7c73b665f715d5c629addad2ec9b@o4511137405206528.ingest.us.sentry.io/4511184683270144"
      - key: NEXT_PUBLIC_SENTRY_DSN
        value: "https://b20d7c73b665f715d5c629addad2ec9b@o4511137405206528.ingest.us.sentry.io/4511184683270144"
      - key: SENTRY_AUTH_TOKEN
        sync: false
      - key: SENTRY_ORG
        value: "cleo-bf"
      - key: SENTRY_PROJECT
        value: "ceo-dashboard"
      - key: GRANOLA_API_TOKEN
        sync: false
      - key: SLACK_PRE_READS_CHANNEL_ID
        value: "C04EU4DEX5E"
      - key: CRON_SECRET
        generateValue: true
      - key: PROBE_SECRET
        sync: false
      - key: PROBE_SECRET_PREVIOUS
        sync: false
      - key: INTERNAL_CRON_SECRET
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_PROBE_CHAT_ID
        sync: false

  - type: worker
    name: ceo-dashboard-sync-worker
    runtime: node
    plan: pro
    buildCommand: NODE_ENV=development npm ci && npm run build
    startCommand: npm run sync-worker
    maxShutdownDelaySeconds: 300
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ceo-dashboard-db
          property: connectionString
      - key: MODE_API_TOKEN
        sync: false
      - key: MODE_API_SECRET
        sync: false
      - key: MODE_WORKSPACE
        sync: false
      - key: SLACK_BOT_TOKEN
        sync: false
      - key: SLACK_OKR_CHANNEL_IDS
        value: "C05LACCBKPU,C09E6L6336G,C09E30B8PD0,C09DMP0UBGX,C09EG0TTJQ1"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GRANOLA_API_TOKEN
        sync: false
      - key: SLACK_PRE_READS_CHANNEL_ID
        value: "C04EU4DEX5E"

  - type: cron
    name: ceo-dashboard-cron
    runtime: node
    schedule: "0 */2 * * *"
    buildCommand: npm ci
    startCommand: 'curl -s -H "Authorization: Bearer $CRON_SECRET" ${RENDER_EXTERNAL_URL}/api/cron'
    envVars:
      - key: CRON_SECRET
        fromService:
          name: ceo-dashboard
          type: web
          envVarKey: CRON_SECRET
      - key: RENDER_EXTERNAL_URL
        fromService:
          name: ceo-dashboard
          type: web
          envVarKey: RENDER_EXTERNAL_URL

  - type: cron
    name: ceo-dashboard-probe-heartbeat
    runtime: node
    schedule: "*/5 * * * *"
    buildCommand: npm ci
    startCommand: 'curl -s -H "Authorization: Bearer $INTERNAL_CRON_SECRET" ${RENDER_EXTERNAL_URL}/api/cron/probe-heartbeat'
    envVars:
      - key: INTERNAL_CRON_SECRET
        fromService:
          name: ceo-dashboard
          type: web
          envVarKey: INTERNAL_CRON_SECRET
      - key: RENDER_EXTERNAL_URL
        fromService:
          name: ceo-dashboard
          type: web
          envVarKey: RENDER_EXTERNAL_URL
