databases:
  - name: ceo-dashboard-db
    plan: pro-4gb
    databaseName: ceo_dashboard
    user: ceo_dashboard

# ---------------------------------------------------------------------------
# Environment variable management
# ---------------------------------------------------------------------------
# Doppler (`ceo-dashboard/prd`) is the source of truth for all secrets and
# operator-tunable config. The .github/workflows/sync-doppler-to-render.yml
# workflow pushes Doppler → Render automatically on every merge to main and
# triggers a fresh deploy. To push manually (e.g. after editing Doppler
# without a merge) run:
#     doppler run -- make sync-render-env
# (RENDER_API_KEY now lives in `ceo-dashboard/prd` so the inline form is rare.)
#
# This file declares only:
#   1. Render-managed values that have no Doppler analogue:
#        - DATABASE_URL  → `fromDatabase` ref (Render resolves at deploy)
#        - CRON_SECRET   → `generateValue: true` (Render auto-generates)
#        - INTERNAL_CRON_SECRET (cron service) → `fromService` ref to web
#        - RENDER_EXTERNAL_URL (cron services) → `fromService` ref to web
#   2. Genuinely static, non-secret config that's safe to commit and is
#      worth keeping declarative-not-implicit:
#        - NODE_ENV=production
#        - NEXT_PUBLIC_CLERK_SIGN_IN_URL=/sign-in
#        - NEXT_PUBLIC_CLERK_SIGN_UP_URL=/sign-up
#        - SENTRY_ORG=cleo-bf, SENTRY_PROJECT=ceo-dashboard
# Everything else (Mode/Slack/Clerk/Anthropic/Google/GitHub/Granola/Sentry
# auth+DSN, probe + Telegram secrets) is pushed from Doppler.
# ---------------------------------------------------------------------------

services:
  - type: web
    name: ceo-dashboard
    runtime: node
    plan: pro
    buildCommand: NODE_ENV=development npm ci && npm run build
    preDeployCommand: npx drizzle-kit migrate
    startCommand: npm start
    healthCheckPath: /
    maxShutdownDelaySeconds: 300
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ceo-dashboard-db
          property: connectionString
      - key: CRON_SECRET
        generateValue: true
      # Static, non-secret routing config — kept declarative for safety
      # so Clerk auth doesn't break if Doppler is misconfigured.
      - key: NEXT_PUBLIC_CLERK_SIGN_IN_URL
        value: /sign-in
      - key: NEXT_PUBLIC_CLERK_SIGN_UP_URL
        value: /sign-up
      - key: SENTRY_ORG
        value: cleo-bf
      - key: SENTRY_PROJECT
        value: ceo-dashboard

  - type: worker
    name: ceo-dashboard-sync-worker
    runtime: node
    plan: pro
    buildCommand: NODE_ENV=development npm ci && npm run build
    startCommand: npm run sync-worker
    maxShutdownDelaySeconds: 300
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ceo-dashboard-db
          property: connectionString

  - type: cron
    name: ceo-dashboard-cron
    runtime: node
    schedule: "0 */2 * * *"
    buildCommand: npm ci
    startCommand: 'curl -s -H "Authorization: Bearer $CRON_SECRET" ${RENDER_EXTERNAL_URL}/api/cron'
    envVars:
      - key: CRON_SECRET
        fromService:
          name: ceo-dashboard
          type: web
          envVarKey: CRON_SECRET
      - key: RENDER_EXTERNAL_URL
        fromService:
          name: ceo-dashboard
          type: web
          envVarKey: RENDER_EXTERNAL_URL

  # Probes meta-watcher cron — calls the stale-heartbeat detector every 5
  # min. INTERNAL_CRON_SECRET is pushed to the web service from Doppler
  # `prd`; this cron resolves it via fromService at deploy time.
  # If INTERNAL_CRON_SECRET is missing from Doppler, every invocation will
  # 401. Set it before relying on probe alerting.
  - type: cron
    name: ceo-dashboard-probe-heartbeat
    runtime: node
    schedule: "*/5 * * * *"
    buildCommand: npm ci
    startCommand: 'curl -s -H "Authorization: Bearer $INTERNAL_CRON_SECRET" ${RENDER_EXTERNAL_URL}/api/cron/probe-heartbeat'
    envVars:
      - key: INTERNAL_CRON_SECRET
        fromService:
          name: ceo-dashboard
          type: web
          envVarKey: INTERNAL_CRON_SECRET
      - key: RENDER_EXTERNAL_URL
        fromService:
          name: ceo-dashboard
          type: web
          envVarKey: RENDER_EXTERNAL_URL
